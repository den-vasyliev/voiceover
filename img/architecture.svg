<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff22"/>
      <stop offset="100%" style="stop-color:#6c63ff11"/>
    </linearGradient>
    <linearGradient id="grad-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3ecfcf22"/>
      <stop offset="100%" style="stop-color:#3ecfcf11"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff22"/>
      <stop offset="100%" style="stop-color:#4a9eff11"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#3ecfcf"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c63ff" opacity="0.7"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3ecfcf" opacity="0.7"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="420" rx="16" fill="url(#bg)"/>

  <!-- ── USER block ── -->
  <rect x="24" y="160" width="110" height="100" rx="12" fill="url(#grad-purple)" stroke="#6c63ff" stroke-width="1.2"/>
  <text x="79" y="195" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6c63ff" font-weight="600" letter-spacing="1">USER</text>
  <!-- mic icon -->
  <rect x="68" y="204" width="22" height="28" rx="11" fill="none" stroke="#8888cc" stroke-width="1.5"/>
  <line x1="79" y1="232" x2="79" y2="242" stroke="#8888cc" stroke-width="1.5"/>
  <line x1="72" y1="242" x2="86" y2="242" stroke="#8888cc" stroke-width="1.5"/>
  <path d="M65,222 Q65,246 93,246 Q107,246 107,222" fill="none" stroke="#8888cc" stroke-width="1.2" opacity="0.5"/>
  <text x="79" y="258" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#8888aa">voice / text</text>

  <!-- ── VOICEOVER block ── -->
  <rect x="190" y="80" width="180" height="260" rx="12" fill="url(#grad-purple)" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="280" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6c63ff" font-weight="700" letter-spacing="1.5">VOICEOVER</text>
  <line x1="205" y1="116" x2="355" y2="116" stroke="#6c63ff" stroke-width="0.5" opacity="0.4"/>

  <!-- STT -->
  <rect x="207" y="126" width="146" height="44" rx="8" fill="#6c63ff18" stroke="#6c63ff" stroke-width="1" opacity="0.9"/>
  <text x="280" y="144" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#aaaaff" font-weight="600">STT</text>
  <text x="280" y="159" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6666aa">OpenAI Whisper</text>

  <!-- LLM -->
  <rect x="207" y="180" width="146" height="44" rx="8" fill="#6c63ff18" stroke="#6c63ff" stroke-width="1" opacity="0.9"/>
  <text x="280" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#aaaaff" font-weight="600">LLM</text>
  <text x="280" y="213" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6666aa">GPT-4.1-mini</text>

  <!-- TTS -->
  <rect x="207" y="234" width="146" height="44" rx="8" fill="#6c63ff18" stroke="#6c63ff" stroke-width="1" opacity="0.9"/>
  <text x="280" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#aaaaff" font-weight="600">TTS</text>
  <text x="280" y="267" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6666aa">ElevenLabs Multilingual</text>

  <!-- VAD -->
  <rect x="207" y="288" width="146" height="38" rx="8" fill="#6c63ff18" stroke="#6c63ff" stroke-width="1" opacity="0.9"/>
  <text x="280" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#aaaaff" font-weight="600">VAD</text>
  <text x="280" y="319" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6666aa">Silero</text>

  <!-- ── PROTOCOL block ── -->
  <rect x="430" y="120" width="130" height="180" rx="12" fill="url(#grad-blue)" stroke="#4a9eff" stroke-width="1.2"/>
  <text x="495" y="147" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#4a9eff" font-weight="700" letter-spacing="1">PROTOCOL</text>
  <line x1="445" y1="154" x2="545" y2="154" stroke="#4a9eff" stroke-width="0.5" opacity="0.4"/>

  <rect x="447" y="163" width="96" height="34" rx="7" fill="#4a9eff18" stroke="#4a9eff" stroke-width="0.8"/>
  <text x="495" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#88bbff" font-weight="600">A2A</text>
  <text x="495" y="191" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#5577aa">message/send</text>

  <rect x="447" y="207" width="96" height="34" rx="7" fill="#4a9eff18" stroke="#4a9eff" stroke-width="0.8"/>
  <text x="495" y="222" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#88bbff" font-weight="600">MCP</text>
  <text x="495" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#5577aa">Streamable HTTP</text>

  <rect x="447" y="251" width="96" height="34" rx="7" fill="#4a9eff18" stroke="#4a9eff" stroke-width="0.8"/>
  <text x="495" y="266" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#88bbff" font-weight="600">Discovery</text>
  <text x="495" y="279" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#5577aa">agent.json</text>

  <!-- ── KAGENT block ── -->
  <rect x="622" y="60" width="172" height="300" rx="12" fill="url(#grad-teal)" stroke="#3ecfcf" stroke-width="1.5"/>
  <text x="708" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#3ecfcf" font-weight="700" letter-spacing="1.5">KAGENT</text>
  <line x1="637" y1="96" x2="779" y2="96" stroke="#3ecfcf" stroke-width="0.5" opacity="0.4"/>

  <!-- agent pills -->
  <rect x="638" y="106" width="148" height="28" rx="7" fill="#3ecfcf18" stroke="#3ecfcf" stroke-width="0.8"/>
  <text x="712" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#3ecfcf">k8s-agent</text>

  <rect x="638" y="142" width="148" height="28" rx="7" fill="#3ecfcf18" stroke="#3ecfcf" stroke-width="0.8"/>
  <text x="712" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#3ecfcf">helm-agent</text>

  <rect x="638" y="178" width="148" height="28" rx="7" fill="#3ecfcf18" stroke="#3ecfcf" stroke-width="0.8"/>
  <text x="712" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#3ecfcf">observability-agent</text>

  <rect x="638" y="214" width="148" height="28" rx="7" fill="#3ecfcf18" stroke="#3ecfcf" stroke-width="0.8"/>
  <text x="712" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#3ecfcf">istio-agent</text>

  <rect x="638" y="250" width="148" height="28" rx="7" fill="#3ecfcf18" stroke="#3ecfcf" stroke-width="0.8"/>
  <text x="712" y="268" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#3ecfcf">cilium-agent</text>

  <rect x="638" y="286" width="148" height="28" rx="7" fill="#3ecfcf18" stroke="#3ecfcf" stroke-width="0.8"/>
  <text x="712" y="304" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#3ecfcf">+ more agents</text>

  <!-- ── ARROWS ── -->
  <!-- User → Voiceover -->
  <line x1="134" y1="200" x2="188" y2="200" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <!-- Voiceover → User (TTS response) -->
  <line x1="190" y1="214" x2="136" y2="214" stroke="#3ecfcf" stroke-width="1.5" marker-end="url(#arrow-teal)" opacity="0.7"/>

  <!-- Voiceover → Protocol -->
  <line x1="371" y1="200" x2="428" y2="200" stroke="#6c63ff" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <!-- Protocol → Voiceover -->
  <line x1="430" y1="214" x2="373" y2="214" stroke="#3ecfcf" stroke-width="1.5" marker-end="url(#arrow-teal)" opacity="0.7"/>

  <!-- Protocol → Kagent -->
  <line x1="561" y1="200" x2="620" y2="200" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <!-- Kagent → Protocol -->
  <line x1="622" y1="214" x2="563" y2="214" stroke="#3ecfcf" stroke-width="1.5" marker-end="url(#arrow-teal)" opacity="0.7"/>

  <!-- ── LABELS on arrows ── -->
  <text x="161" y="195" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#8888aa">speech</text>
  <text x="161" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#8888aa">audio</text>
  <text x="399" y="195" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#8888aa">tool call</text>
  <text x="399" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#8888aa">result</text>
  <text x="590" y="195" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#8888aa">task</text>
  <text x="590" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#8888aa">response</text>

  <!-- ── KUBERNETES badge at bottom ── -->
  <rect x="622" y="372" width="172" height="28" rx="8" fill="#3ecfcf0a" stroke="#3ecfcf" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="708" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#3ecfcf" opacity="0.7">Kubernetes Cluster</text>
</svg>
